<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Food Delivery</title>
<script src="https://cdn.jsdelivr.net/npm/iconify-icon@2/dist/iconify-icon.min.js"></script>
<!-- ล็อกฟอนต์ให้ตรงกับแอป InGreen (IBM Plex Sans Thai) — เหมือนกันทุกเครื่อง -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --brand: #00B14F; --ingreen: #2D8048; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'IBM Plex Sans Thai', 'Segoe UI', system-ui, sans-serif; background: #E9ECEF; color: #1b1b1b; display: flex; justify-content: center; padding: 14px; }
  button, input, select, textarea { font-family: 'IBM Plex Sans Thai', 'Segoe UI', system-ui, sans-serif; }
  .app { width: 100%; max-width: 430px; background: #fff; border-radius: 28px; overflow: hidden; box-shadow: 0 24px 60px rgba(0,0,0,.18); position: relative; padding-bottom: 70px; }
  img { display: block; }

  /* shared cover */
  .cover { position: relative; height: 200px; background: #ddd; }
  .cover > img { width: 100%; height: 100%; object-fit: cover; }
  .topbar { position: absolute; top: 0; left: 0; right: 0; padding: 14px 14px 0; display: flex; align-items: center; gap: 10px; }
  .cbtn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .cbtn.dark { background: rgba(0,0,0,.4); backdrop-filter: blur(4px); color: #fff; }
  .cbtn.light { background: #fff; color: #222; box-shadow: 0 2px 8px rgba(0,0,0,.18); }

  /* shared add button + health badges */
  .add { background: var(--brand); color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 3px 8px rgba(0,0,0,.25); }
  .hbadge { height: 22px; padding: 0 8px; border-radius: 11px; color: #fff; font-size: 10.5px; font-weight: 800; display: none; align-items: center; gap: 3px; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
  .galert { font-size: 10.5px; margin-top: 5px; line-height: 1.35; display: flex; align-items: flex-start; gap: 4px; }
  .galert.bad { color: #C62828; } .galert.good { color: #1f7a3a; }
  .gflags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
  .gflag { font-size: 9.5px; background: #FFF3E0; color: #B26A00; padding: 2px 7px; border-radius: 6px; font-weight: 700; }
  /* จุดสุขภาพมุมรูป (subtle ไม่แดงเถือก) */
  .hdot { position: absolute; top: 7px; right: 7px; width: 12px; height: 12px; border-radius: 50%; box-shadow: 0 0 0 2px rgba(255,255,255,.95); z-index: 3; }
  .hdot.red { background: #E53935; animation: hblink 1.1s infinite; }
  .hdot.amber { background: #F0A500; } .hdot.green { background: #16B36B; }
  .galert.bad { color: #9E4A4A !important; } .galert.bad .ldot { width:7px; height:7px; border-radius:50%; background:#E53935; animation:hblink 1.1s infinite; flex-shrink:0; margin-top:3px; }
  @keyframes hblink { 0%,100%{opacity:1} 50%{opacity:.25} }
  /* แถบ filter ซ่อนเมนูที่แพ้ */
  .filterbar { margin: 12px 14px 0; display: none; align-items: center; gap: 10px; background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 11px 14px; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
  .filterbar.show { display: flex; }
  .filterbar .fb-l { flex: 1; display: flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; color: #555; }
  .fb-dot { width: 9px; height: 9px; border-radius: 50%; background: #E53935; animation: hblink 1.1s infinite; }
  .fb-toggle { display: flex; align-items: center; gap: 9px; cursor: pointer; font-size: 12.5px; font-weight: 700; color: #777; }
  .sw { width: 42px; height: 24px; border-radius: 13px; background: #ccc; position: relative; transition: background .2s; flex-shrink: 0; }
  .sw.on { background: var(--brand); }
  .sw .knob { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
  .sw.on .knob { left: 21px; }
  /* ── ♻️ บรรจุภัณฑ์รักษ์โลก ── */
  .ecochip { display: inline-flex; align-items: center; gap: 4px; margin-top: 5px; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 20px; line-height: 1.3; }
  .ecochip iconify-icon { font-size: 12px; }
  .ecochip.eco  { background: #E7F6E1; color: #1f7a3a; }
  .ecochip.good { background: #EAF4FB; color: #1667a8; }
  .ecochip.poor { background: #FFF3E0; color: #B26A00; }
  .ecochip.bad  { background: #FDECEA; color: #C62828; }
  .ecochip.unknown { background: #f1f1f1; color: #888; }
  .ecostrip { display: none; margin: 10px 14px 0; background: #F4FBEE; border: 1.5px solid #CDE9B6; border-radius: 16px; padding: 12px 14px; }
  .ecostrip.show { display: block; }
  .eco-h { font-size: 13px; font-weight: 800; color: #1B5E37; display: flex; align-items: center; gap: 6px; }
  .eco-h .eco-src { font-size: 10.5px; font-weight: 700; color: #5a8f5a; background: #fff; border: 1px solid #CDE9B6; border-radius: 10px; padding: 1px 7px; margin-left: auto; }
  .eco-row { display: flex; align-items: center; gap: 10px; cursor: pointer; margin-top: 11px; font-size: 12.5px; font-weight: 700; color: #33502f; }
  .eco-row > span { flex: 1; display: flex; align-items: center; gap: 7px; }
  .eco-row iconify-icon { font-size: 16px; color: #2D8048; }
  .eco-row.alert { color: #b23b3b; border-bottom: 1px solid #E0EDD3; padding-bottom: 12px; }
  .eco-row.alert iconify-icon { color: #E53935; }
  .eco-row.alert b { color: #E53935; }
  .eco-note { margin-top: 11px; font-size: 10.5px; line-height: 1.45; color: #6a7a68; display: flex; align-items: flex-start; gap: 5px; }
  .eco-note b { color: #1f7a3a; }
  .ecoimpact { position: absolute; left: 12px; right: 12px; bottom: 62px; background: #1f7a3a; color: #fff; border-radius: 13px; padding: 10px 14px; font-size: 12.5px; font-weight: 800; display: flex; align-items: center; gap: 7px; box-shadow: 0 6px 18px rgba(31,122,58,.35); z-index: 6; animation: ecopop .25s ease; }
  @keyframes ecopop { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* shared InGreen strip */
  .ingreen { margin: 14px 14px 0; border-radius: 16px; padding: 13px; display: flex; align-items: center; gap: 11px; cursor: pointer; background: #F4FBEE; border: 1.5px solid #CDE9B6; }
  .ingreen.on { background: linear-gradient(120deg,#EAF7E0,#F4FBEE); border-color: #8DD06A; }
  .ingreen .ibadge { width: 40px; height: 40px; border-radius: 12px; background: var(--ingreen); display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
  .ingreen .itxt { flex: 1; min-width: 0; }
  .ingreen .it1 { font-size: 13.5px; font-weight: 800; color: #1B5E37; display: flex; align-items: center; gap: 5px; }
  .ingreen .it2 { font-size: 11px; color: #6a8a5a; margin-top: 2px; line-height: 1.4; }
  .ingreen .icta { font-size: 12.5px; font-weight: 800; color: #fff; background: var(--ingreen); padding: 8px 14px; border-radius: 11px; flex-shrink: 0; }
  .banner { margin: 12px 14px 0; background: #FCEBEB; color: #A32D2D; border-radius: 12px; padding: 11px 13px; font-size: 12px; display: none; align-items: center; gap: 8px; line-height: 1.4; }
  .banner.show { display: flex; }

  .cartbar { position: absolute; left: 0; right: 0; bottom: 0; background: var(--brand); color: #fff; padding: 16px 18px; display: flex; align-items: center; justify-content: space-between; font-weight: 800; font-size: 14.5px; }
  .cartbar .n { background: rgba(255,255,255,.25); border-radius: 8px; padding: 3px 10px; font-size: 12px; }

  /* ===== GrabFood ===== */
  .g-rest { background: #fff; margin: -42px 14px 0; border-radius: 18px; padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,.1); position: relative; display: flex; gap: 13px; }
  .g-rest .rphoto { width: 92px; height: 92px; border-radius: 14px; object-fit: cover; flex-shrink: 0; background: #eee; }
  .g-rest .rinfo { flex: 1; min-width: 0; }
  .g-rest h1 { font-size: 21px; font-weight: 800; letter-spacing: -.3px; user-select: none; }
  .g-rest .loc { font-size: 13px; color: #9a9a9a; margin-top: 2px; }
  .g-rest .rate { display: flex; align-items: center; gap: 4px; margin-top: 7px; font-size: 14px; font-weight: 800; }
  .g-rest .rate iconify-icon { color: #FFC400; } .g-rest .rate .n2 { color: #9a9a9a; font-weight: 600; font-size: 12.5px; }
  .g-rest .deliv { display: flex; align-items: center; gap: 6px; margin-top: 6px; font-size: 12.5px; color: #444; }
  .g-rest .deliv .free { color: var(--brand); font-weight: 800; } .g-rest .deliv s { color: #bbb; } .g-rest .deliv iconify-icon { color: var(--brand); }
  .g-acts { display: flex; gap: 9px; overflow-x: auto; padding: 14px 14px 2px; scrollbar-width: none; } .g-acts::-webkit-scrollbar { display: none; }
  .g-pill { flex-shrink: 0; display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; color: #444; background: #fff; border: 1.5px solid #eee; padding: 9px 15px; border-radius: 24px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,.04); }
  .g-pill.primary { color: #F06B1E; border-color: #F7C9A8; } .g-pill iconify-icon { font-size: 17px; }
  .g-promos { display: flex; gap: 10px; overflow-x: auto; padding: 14px 14px 4px; scrollbar-width: none; } .g-promos::-webkit-scrollbar { display: none; }
  .g-promo { flex-shrink: 0; min-width: 180px; background: #fff; border: 1px solid #f0f0f0; border-radius: 14px; padding: 11px 12px; display: flex; align-items: center; gap: 9px; box-shadow: 0 3px 10px rgba(0,0,0,.05); }
  .g-fire { width: 38px; height: 40px; border-radius: 9px; background: linear-gradient(160deg,#FF7A00,#E8203B); color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 8px; font-weight: 800; flex-shrink: 0; gap: 1px; } .g-fire iconify-icon { font-size: 17px; }
  .g-pt1 { font-size: 14px; font-weight: 800; } .g-pt2 { font-size: 10.5px; color: #999; margin-top: 1px; }
  .g-cd { display: flex; gap: 3px; margin-top: 4px; } .g-cd span { background: #4A2600; color: #fff; font-size: 11px; font-weight: 800; padding: 2px 5px; border-radius: 5px; font-variant-numeric: tabular-nums; }
  .g-shead { display: flex; align-items: center; padding: 20px 16px 10px; } .g-shead h2 { font-size: 19px; font-weight: 800; flex: 1; letter-spacing: -.3px; }
  .g-arrow { width: 34px; height: 34px; border-radius: 50%; background: #EAF7EF; color: var(--brand); display: flex; align-items: center; justify-content: center; }
  .g-offers { display: flex; gap: 12px; overflow-x: auto; padding: 0 14px 4px; scrollbar-width: none; } .g-offers::-webkit-scrollbar { display: none; }
  .g-ocard { flex-shrink: 0; width: 270px; background: #fff; border: 1px solid #f1f1f1; border-radius: 16px; padding: 11px; display: flex; gap: 12px; box-shadow: 0 4px 14px rgba(0,0,0,.05); position: relative; }
  .g-otw { position: relative; width: 96px; height: 96px; flex-shrink: 0; } .g-othumb { width: 96px; height: 96px; border-radius: 13px; object-fit: cover; background: #eee; } .g-othumb.emoji { display:flex;align-items:center;justify-content:center;font-size:42px; }
  .g-oinfo { flex: 1; min-width: 0; display: flex; flex-direction: column; } .g-oname { font-size: 14.5px; font-weight: 700; line-height: 1.3; }
  .g-oprice { margin-top: auto; display: flex; align-items: center; gap: 7px; font-size: 16px; font-weight: 800; } .g-oprice s { color: #bbb; font-size: 13px; font-weight: 600; } .g-oprice .tag { color: #F06B1E; font-size: 15px; }
  .g-otw .hbadge { position:absolute; right:6px; top:6px; }
  .g-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 4px 14px 14px; }
  .g-card { background: #fff; border-radius: 16px; overflow: hidden; }
  .g-tw { position: relative; width: 100%; aspect-ratio: 1/1; background: #eee; } .g-thumb { width: 100%; height: 100%; object-fit: cover; } .g-thumb.emoji { display:flex;align-items:center;justify-content:center;font-size:52px; }
  .g-tw .add { position: absolute; right: 8px; bottom: 8px; width: 34px; height: 34px; border-radius: 50%; font-size: 24px; font-weight: 600; }
  .g-tw .hbadge { position: absolute; right: 8px; top: 8px; }
  .g-seller { position: absolute; left: 0; top: 10px; background: var(--brand); color: #fff; font-size: 10px; font-weight: 800; padding: 3px 9px; border-radius: 0 8px 8px 0; }
  .g-body { padding: 9px 4px 4px; } .g-name { font-size: 14px; font-weight: 700; line-height: 1.3; } .g-price { font-size: 15px; font-weight: 800; margin-top: 4px; }

  /* ===== LINE MAN ===== */
  .l-rest { padding: 16px 16px 0; }
  .l-namerow { display: flex; align-items: flex-start; gap: 10px; }
  .l-rest h1 { font-size: 22px; font-weight: 800; line-height: 1.25; letter-spacing: -.3px; flex: 1; user-select: none; }
  .l-nameic { display: flex; align-items: center; gap: 10px; color: #888; padding-top: 4px; }
  .l-meta { display: flex; align-items: center; gap: 9px; margin-top: 13px; flex-wrap: wrap; font-size: 13px; color: #444; }
  .l-rate { display: inline-flex; align-items: center; gap: 5px; border: 1px solid #eee; border-radius: 10px; padding: 6px 10px; font-weight: 800; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
  .l-rate iconify-icon { color: #FFC400; } .l-rate .c { color: #999; font-weight: 600; }
  .l-vip { display: inline-flex; align-items: center; gap: 5px; font-weight: 700; }
  .l-vipbadge { background: linear-gradient(120deg,#7B61FF,#3D7BFF); color: #fff; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 4px; letter-spacing: .3px; }
  .l-dist { color: #555; } .l-dist s { color: #bbb; }
  .l-acts { display: flex; gap: 10px; overflow-x: auto; padding: 16px 16px 4px; scrollbar-width: none; } .l-acts::-webkit-scrollbar { display:none; }
  .l-act { flex-shrink: 0; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: #333; background: #fff; border: 1px solid #ededed; padding: 11px 16px; border-radius: 14px; white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
  .l-act .gi { color: var(--brand); font-size: 20px; }
  .l-vouchers { display: flex; gap: 10px; overflow-x: auto; padding: 14px 16px 4px; scrollbar-width: none; } .l-vouchers::-webkit-scrollbar { display:none; }
  .l-vch { flex-shrink: 0; min-width: 250px; display: flex; align-items: stretch; border-radius: 12px; overflow: hidden; border: 1px solid #eee; }
  .l-vch.applied { border: 1.5px dashed #2BC36B; background: #F1FBF4; }
  .l-vch .vl { flex: 1; display: flex; align-items: center; gap: 9px; padding: 11px 12px; }
  .l-vcoin { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; flex-shrink: 0; }
  .l-vt1 { font-size: 13.5px; font-weight: 800; } .l-vt2 { font-size: 11px; color: #8aa; margin-top: 1px; color: #2BC36B; font-weight: 700; }
  .l-vch .vr { display: flex; align-items: center; padding: 0 14px; font-size: 13px; font-weight: 800; color: var(--brand); border-left: 1px dashed #cfe9d8; }
  .l-tabs { display: flex; align-items: center; gap: 18px; padding: 16px 16px 0; border-bottom: 1px solid #f0f0f0; overflow-x: auto; scrollbar-width: none; position: sticky; top: 0; background: #fff; z-index: 5; } .l-tabs::-webkit-scrollbar { display:none; }
  .l-tabic { color: #555; font-size: 22px; flex-shrink: 0; }
  .l-tab { flex-shrink: 0; font-size: 15px; font-weight: 700; color: #999; padding: 4px 0 12px; border-bottom: 3px solid transparent; white-space: nowrap; cursor: pointer; }
  .l-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
  .l-sec { font-size: 19px; font-weight: 800; padding: 18px 16px 8px; scroll-margin-top: 56px; }
  .l-list { padding: 0 16px; }
  .l-row { display: flex; gap: 13px; padding: 14px 0; border-bottom: 1px solid #f3f3f3; }
  .l-rinfo { flex: 1; min-width: 0; }
  .l-rname { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .l-rdesc { font-size: 12px; color: #9a9a9a; margin-top: 3px; line-height: 1.4; }
  .l-rprice { font-size: 15px; font-weight: 800; margin-top: 7px; }
  .l-rtw { position: relative; width: 96px; height: 96px; flex-shrink: 0; }
  .l-rthumb { width: 96px; height: 96px; border-radius: 13px; object-fit: cover; background: #eee; } .l-rthumb.emoji { display:flex;align-items:center;justify-content:center;font-size:44px; }
  .l-rtw .add { position: absolute; right: -6px; bottom: -6px; width: 32px; height: 32px; border-radius: 50%; font-size: 23px; font-weight: 600; }
  .l-rtw .hbadge { position: absolute; left: -4px; top: -6px; }
  .l-vipbar { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg,#EEF3FF,#F3EEFF); padding: 15px 18px; display: flex; align-items: center; gap: 10px; }
  .l-vipbar .vb { background: linear-gradient(120deg,#7B61FF,#3D7BFF); color: #fff; font-size: 10px; font-weight: 900; padding: 3px 7px; border-radius: 5px; }
  .l-vipbar .vt { flex: 1; font-size: 13.5px; font-weight: 700; color: #333; } .l-vipbar iconify-icon { color: #888; }

  /* ===== Shopee Food ===== */
  .cbtn.gray { background: rgba(110,110,110,.5); backdrop-filter: blur(4px); color:#fff; }
  .s-foodie { position:absolute; left:0; right:0; bottom:0; background:linear-gradient(90deg,#EE2C1F,#FF6A00); display:flex; align-items:stretch; height:60px; }
  .s-foodie .fw { background:#D0021B; color:#fff; font-size:15px; font-weight:900; line-height:1.05; padding:0 14px; display:flex; flex-direction:column; justify-content:center; }
  .s-foodie .fc { flex:1; color:#fff; display:flex; align-items:center; gap:7px; padding:0 12px; font-weight:900; font-size:13px; }
  .s-foodie .fc .big { font-size:23px; } .s-foodie .fc .free { background:#19A78E; padding:4px 8px; border-radius:6px; }
  .s-grouppill { display:flex; justify-content:flex-end; padding:0 14px; margin-top:-21px; position:relative; z-index:3; }
  .s-grouppill .gp { background:#fff; color:#F06B1E; border:1.5px solid #F7C9A8; border-radius:24px; padding:11px 18px; font-size:14px; font-weight:800; display:flex; align-items:center; gap:8px; box-shadow:0 4px 14px rgba(0,0,0,.12); }
  .s-rest { padding: 12px 16px 0; }
  .s-namerow { display:flex; align-items:center; gap:8px; } .s-rest h1 { font-size:24px; font-weight:800; flex:1; line-height:1.2; user-select:none; } .s-namerow iconify-icon { color:#bbb; }
  .s-cat { font-size:14px; color:#9a9a9a; margin-top:6px; }
  .s-rate { display:flex; align-items:center; gap:8px; margin-top:12px; font-size:15px; font-weight:700; }
  .s-rate .stars { color:#FFB400; display:flex; gap:1px; font-size:19px; } .s-rate .rv { color:#555; } .s-rate iconify-icon.ch { color:#bbb; }
  .s-deliv { display:flex; align-items:center; gap:10px; margin-top:12px; font-size:13.5px; color:#444; }
  .s-deliv .mt iconify-icon { color:var(--brand); } .s-deliv .fee { color:var(--brand); font-weight:800; } .s-deliv s { color:#bbb; } .s-deliv .edit { margin-left:auto; color:#888; display:flex; align-items:center; gap:2px; }
  .s-promohead { display:flex; align-items:center; gap:8px; padding:18px 16px 10px; } .s-promohead .pi { color:var(--brand); font-size:22px; } .s-promohead .t { flex:1; font-size:16px; font-weight:800; } .s-promohead .all { color:#888; font-size:13px; display:flex; align-items:center; }
  .s-coupons { display:flex; gap:9px; overflow-x:auto; padding:0 16px 6px; scrollbar-width:none; } .s-coupons::-webkit-scrollbar{display:none;}
  .s-cpn { flex-shrink:0; min-width:150px; border:1px dashed #F3B7AE; background:#FFF4F2; border-radius:10px; padding:9px 11px; display:flex; align-items:center; gap:8px; }

let HEALTH = {}, cart = 0, cartTotal = 0, BRAND = 'grab', MENU = MENUS.grab, REST = RESTS.grab;

function getCfg(){ try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem('mockfood_cfg')||'{}') }; } catch { return {...DEFAULTS}; } }
function setCfg(c){ localStorage.setItem('mockfood_cfg', JSON.stringify(c)); }
function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(window._tt); window._tt=setTimeout(()=>t.classList.remove('show'),1900); }
function sevTH(s){ return ({mild:'เล็กน้อย',medium:'ปานกลาง',severe:'รุนแรง'})[s]||s; }
function addToCart(m){ cart++; cartTotal+=m.price; const n=$('cart-n'),t=$('cart-total'); if(n)n.textContent=cart; if(t)t.textContent='฿'+cartTotal;

  let saved=0; if(CONNECTED){ if(noCutlery) saved+=1; if(pkgOf(m).tier==='eco') saved+=1; }

function healthBadge(r){ if(!r) return '';

function healthLine(r){ if(!r) return '';

  return '<div class="galert good"><iconify-icon icon="mdi:check-circle"></iconify-icon> เหมาะกับคุณ</div>'; }

/* ── ♻️ บรรจุภัณฑ์รักษ์โลก (ต่อยอด Green Profile scope: sustainability) ── */
const PKG = { // วัสดุบรรจุภัณฑ์จริงของแต่ละเมนู (id → material) — cup = เครื่องดื่ม (แก้ว)
  1:'bagasse',2:'paper',3:'bagasse',4:'paper',5:'bagasse',6:'leaf',7:'paper',8:'bagasse',9:'paper',10:'cup',11:'cup',12:'leaf',
  21:'paper',22:'paper',23:'plastic',24:'plastic',25:'plastic',26:'bagasse',27:'foam',28:'paper',
  31:'plastic',32:'bagasse',33:'plastic',34:'paper',35:'paper',36:'plastic',37:'bagasse',38:'cup' };
const PKG_INFO = {
  bagasse: { label:'กล่องชานอ้อย', tier:'eco',  icon:'mdi:sprout' },
  leaf:    { label:'ห่อใบตอง',      tier:'eco',  icon:'mdi:leaf' },
  paper:   { label:'กล่องกระดาษ',   tier:'good', icon:'mdi:recycle' },
  plastic: { label:'กล่องพลาสติก',  tier:'poor', icon:'mdi:alert-outline' },
  cup:     { label:'แก้วพลาสติก',   tier:'poor', icon:'mdi:cup-outline' },
  foam:    { label:'กล่องโฟม',      tier:'bad',  icon:'mdi:alert-octagon-outline' },
  unknown: { label:'ไม่ระบุ',       tier:'unknown', icon:'mdi:help-circle-outline' } };
const pkgOf = (m)=>PKG_INFO[PKG[m.id]]||PKG_INFO.unknown;
const ECO_RANK = { eco:0, good:1, unknown:2, poor:3, bad:4 };
function ecoRank(m){ const t=pkgOf(m).tier; return (t in ECO_RANK)?ECO_RANK[t]:2; }
// แสดง "วัสดุจริง" (ไม่ใช่แค่ป้ายเขียว) = โปร่งใส กันฟอกเขียว
function ecoBadge(m){ const p=pkgOf(m); return '<div class="ecochip '+p.tier+'"><iconify-icon icon="'+p.icon+'"></iconify-icon>'+p.label+'</div>'; }
let ecoFirst = false, noCutlery = false, CONNECTED = false, plasticSaved = 0;
// ตัวนับ "ช่วยลดขยะพลาสติก" — โผล่เหนือแถบตะกร้าเมื่อสั่งของแบบรักษ์โลก
function ensureEcoImpact(){ if($('ecoimpact')) return; const cb=document.querySelector('.cartbar'); if(!cb||!cb.parentElement) return;
  const d=document.createElement('div'); d.className='ecoimpact'; d.id='ecoimpact'; d.style.display='none';
  d.innerHTML='<iconify-icon icon="mdi:sprout" width="17"></iconify-icon><span id="ecoimpact-t"></span>';
  cb.parentElement.insertBefore(d, cb); }
function renderEcoImpact(){ ensureEcoImpact(); const el=$('ecoimpact'), t=$('ecoimpact-t'); if(!el) return;
  if(CONNECTED && plasticSaved>0){ t.textContent='ช่วยลดขยะพลาสติกไปแล้ว '+plasticSaved+' ชิ้น'; el.style.display='flex'; }
  else { el.style.display='none'; } }
function toggleEcoFirst(){ ecoFirst=!ecoFirst; const s=$('eco-sw1'); if(s)s.classList.toggle('on',ecoFirst); renderMenu(); toast(ecoFirst?'จัดเมนูบรรจุภัณฑ์รักษ์โลกขึ้นก่อน 🌱':'เรียงตามร้านปกติ'); }
function toggleCutlery(){ noCutlery=!noCutlery; const s=$('eco-sw2'); if(s)s.classList.toggle('on',noCutlery); toast(noCutlery?'จะไม่รับช้อนส้อมพลาสติก — ช่วยลดขยะ 🌱':'จะรับช้อนส้อมพลาสติกตามปกติ'); }
function ecoStripHTML(){ return '<div class="ecostrip" id="ecostrip">'+

  '<div class="eco-row" onclick="toggleEcoFirst()"><span><iconify-icon icon="mdi:sort-variant"></iconify-icon> จัดเมนูบรรจุภัณฑ์รักษ์โลกขึ้นก่อน</span><div class="sw" id="eco-sw1"><div class="knob"></div></div></div>'+
  '<div class="eco-row" onclick="toggleCutlery()"><span><iconify-icon icon="mdi:silverware-fork-knife"></iconify-icon> ไม่รับช้อนส้อมพลาสติก</span><div class="sw" id="eco-sw2"><div class="knob"></div></div></div>'+
  '<div class="eco-note"><iconify-icon icon="mdi:information-outline"></iconify-icon> จัดอันดับจาก<b>วัสดุบรรจุภัณฑ์จริง</b></div></div>'; }

let hideAllergic = false;
function menuList(){ let list = hideAllergic ? MENU.filter(m=>!(HEALTH[m.name] && HEALTH[m.name].safe===false)) : MENU.slice();
  if(ecoFirst) list.sort((a,b)=>ecoRank(a)-ecoRank(b));   // เมนูบรรจุภัณฑ์รักษ์โลกขึ้นก่อน
  return list; }
function updateFilterBar(){ const row=$('eco-allergyrow'); if(!row) return;
  const n=MENU.filter(m=>HEALTH[m.name] && HEALTH[m.name].safe===false).length;
  if(n>0){ row.style.display='flex'; const b=$('eco-allergyn'); if(b) b.textContent='('+n+')'; } else { row.style.display='none'; hideAllergic=false; }

/* ── connect ── */
function onConnClick(){ getCfg().consent ? getRecs() : openConnect(); }
function openConnect(){ const c=getCfg(); $('in-consent').value=c.consent||''; $('in-base').value=c.base; $('in-key').value=c.key; $('connect-modal').classList.add('show'); }
function closeConnect(){ $('connect-modal').classList.remove('show'); }
function doConnect(){ const consent=$('in-consent').value.trim(); if(!consent){ toast('กรุณาใส่รหัสเชื่อมต่อ'); return; }
  const cur=getCfg(); setCfg({ ...cur, base:($('in-base').value.trim()||DEFAULTS.base).replace(/\/$/,''), key:$('in-key').value.trim()||DEFAULTS.key, consent });
  closeConnect(); toast('กำลังเชื่อมต่อ…'); getRecs(); }
function bindHold(){ const rt=$('rest-title'); if(!rt) return; let h; const s=()=>{ h=setTimeout(()=>{ openConnect(); $('adv').classList.add('show'); toast('โหมดนักพัฒนา'); },700); }; const e=()=>clearTimeout(h);
  rt.addEventListener('mousedown',s); rt.addEventListener('touchstart',s,{passive:true}); rt.addEventListener('mouseup',e); rt.addEventListener('mouseleave',e); rt.addEventListener('touchend',e); }
function setConn(connected){ const el=$('conn'); if(!el) return;
  CONNECTED = connected;
  const es=$('ecostrip'), s1=$('eco-sw1'), s2=$('eco-sw2');
  if(connected){ el.classList.add('on'); $('conn-t1').innerHTML='<iconify-icon icon="mdi:check-decagram" style="color:#2D8048"></iconify-icon> เชื่อม InGreen แล้ว'; $('conn-t2').textContent='เมนูถูกปรับให้เหมาะกับสุขภาพและความรักษ์โลกของคุณแล้ว'; $('conn-cta').textContent='รีเฟรช';
    // profile.sustainability: prefer_eco_packaging + decline_plastic_cutlery = true → ตั้งค่าเริ่มต้นให้
    ecoFirst=true; noCutlery=true; if(es)es.classList.add('show'); if(s1)s1.classList.add('on'); if(s2)s2.classList.add('on'); }
  else { el.classList.remove('on'); $('conn-t1').innerHTML='<iconify-icon icon="mdi:link-variant"></iconify-icon> เชื่อมบัญชี InGreen'; $('conn-t2').textContent='เตือนเมนูที่คุณแพ้ และแนะนำเมนูที่ดีต่อสุขภาพ เฉพาะคุณ'; $('conn-cta').textContent='เชื่อม';
    ecoFirst=false; noCutlery=false; if(es)es.classList.remove('show'); if(s1)s1.classList.remove('on'); if(s2)s2.classList.remove('on'); }
  renderEcoImpact(); }
function banner(msg){ const b=$('banner'); if(!b) return; if(!msg){ b.classList.remove('show'); return; } $('banner-text').textContent=msg; b.classList.add('show'); }

/* ── brand switch ── */
function detectBrand(){ const a=(getCfg().app||'').toLowerCase(); if(a.includes('line')) return 'lineman'; if(a.includes('shopee')) return 'shopee'; return 'grab'; }
function renderMenu(){ if(BRAND==='lineman') renderLineman(); else if(BRAND==='shopee') renderShopee(); else renderGrab(); }
function renderApp(){
  const c=getCfg();
  if(c.color && /^[0-9a-fA-F]{3,8}$/.test(c.color)) document.documentElement.style.setProperty('--brand','#'+c.color);
  if(c.app) document.title=c.app;
  BRAND=detectBrand(); MENU=MENUS[BRAND]; REST=RESTS[BRAND];
  $('root').innerHTML = BRAND==='lineman' ? layoutLineman() : BRAND==='shopee' ? layoutShopee() : layoutGrab();
  bindHold(); renderMenu();
}

async function getRecs(){
  const c=getCfg(); if(!c.consent){ openConnect(); return; } banner('');
  try {
    const res=await fetch(c.base+'/api/partner/v1/green-check',{ method:'POST',
      headers:{ 'Content-Type':'application/json','Authorization':'Bearer '+c.key,'X-Consent-Token':c.consent,'ngrok-skip-browser-warning':'true' },
      body: JSON.stringify({ items: MENU.map(m=>({ name:m.name, ingredients:m.ingredients, kcal:m.kcal, sodium_mg:m.sodium_mg, sugar_g:m.sugar_g, packaging: PKG[m.id], tags:m.tags||[] })) }), });
    if(res.status===403){ setConn(false); HEALTH={}; renderMenu(); updateFilterBar(); banner('การเชื่อมต่อถูกยกเลิก — ไม่มีคำแนะนำส่วนตัว'); toast('การเชื่อมต่อถูกยกเลิก'); return; }
    if(!res.ok){ const e=await res.json().catch(()=>({})); toast('เชื่อมต่อไม่สำเร็จ: '+(e.message||e.error||res.status)); return; }
    const data=await res.json();
    HEALTH={}; (data.results||[]).forEach(r=>{ HEALTH[r.name]={ safe:r.allergy.safe, hits:r.allergy.hits, max_severity:r.allergy.max_severity, health_flags:r.health_flags }; });
    setConn(true); renderMenu(); updateFilterBar(); toast('ปรับเมนูให้เหมาะกับคุณแล้ว ✓');
  } catch(err){ toast('เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง'); console.error(err); }
}

// countdown (grab)
setInterval(()=>{ const el=$('cd'); if(!el) return; let cd=(window._cd=(window._cd>0?window._cd-1:14*60+54)); const m=String(Math.floor(cd/60)).padStart(2,'0'),s=String(cd%60).padStart(2,'0'); el.innerHTML='<span>00</span><span>'+m+'</span><span>'+s+'</span>'; },1000);
window._cd=14*60+54;

(function initFromUrl(){ try { const p=new URLSearchParams(location.search); const ct=p.get('ct');
  if(ct){ const cur=getCfg(); setCfg({ ...cur, base:(p.get('api')||cur.base).replace(/\/$/,''), key:p.get('key')||cur.key, consent:ct, app:p.get('app')||cur.app||'', color:p.get('color')||cur.color||'' }); history.replaceState(null,'',location.pathname); } } catch {} })();

renderApp();
if(getCfg().consent) getRecs();
