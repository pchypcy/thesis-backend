# ยิง ping ไปที่ backend บน Render ทุก 10 นาที กันไม่ให้ free tier หลับ (หลับหลังไม่มี traffic 15 นาที)
# → ผู้ใช้กดสมัคร/เข้าสู่ระบบได้ทันทีตลอด 24 ชม. โดยไม่ต้องมีใครไปเปิดเว็บปลุกก่อน
name: Keep backend awake

on:
  schedule:
    - cron: '*/10 * * * *'   # ทุก 10 นาที (เวลาจริงอาจดีเลย์ได้เล็กน้อยตามคิวของ GitHub)
  workflow_dispatch:          # เผื่อกดรันเองจากหน้า Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' -m 90 --retry 3 --retry-delay 15 https://thesis-backend-q3qm.onrender.com/)
          echo "backend responded: HTTP $code"
          [ "$code" = "200" ]
